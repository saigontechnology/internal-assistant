# .tmux.conf — DocWise project tmux config (loaded by dev-tmux.sh)
#
# Sourced into the tmux server when the docwise session is created, so the
# dev stack looks the same on any machine without touching ~/.tmux.conf.

# ── Colors / capabilities ───────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"  # truecolor

# ── Navigation ──────────────────────────────────────────────────────────
set -g mouse on                       # click panes, drag borders, scroll

bind -n M-Left  select-pane -L        # Option+arrow (no prefix)
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind h select-pane -L                 # prefix + vim keys
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane borders: show a title bar on each pane ─────────────────────────
set -g pane-border-status top
set -g pane-border-format " #[bold]#{pane_title}#[default] "
set -g pane-border-lines heavy
set -g pane-border-style        "fg=#3b3b4f"
set -g pane-active-border-style "fg=#8b5cf6,bold"     # violet on focus
setw -g automatic-rename off
set -g allow-rename off

# ── Status bar (violet editorial theme) ─────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#16161f,fg=#b8b8c8"

set -g status-left-length 24
set -g status-left "#[bg=#8b5cf6,fg=#16161f,bold] ❯ #S #[bg=#16161f,fg=#8b5cf6]▏"

set -g status-right-length 48
set -g status-right "#[fg=#6b6b85]#(whoami) #[fg=#8b5cf6]▕#[bg=#8b5cf6,fg=#16161f,bold] %a %H:%M #[bg=#a78bfa,fg=#16161f,bold] DocWise "

setw -g window-status-current-style "fg=#a78bfa,bold"
setw -g window-status-style         "fg=#6b6b85"
setw -g window-status-format        " #I:#W "
setw -g window-status-current-format " #I:#W "

# ── Quality of life ─────────────────────────────────────────────────────
set -g base-index 1                   # windows start at 1
set -g renumber-windows on
set -sg escape-time 10                # snappier Option/Esc handling
set -g history-limit 20000
set -g display-time 1500
set -g focus-events on
