# Maps the client's Upgrade header to the right Connection value.
#
# The old config hardcoded `Connection: "upgrade"` on every proxied request.
# That's only correct for a WebSocket handshake; on an ordinary request it tells
# the upstream to close the connection after the response, which defeats
# keepalive entirely. This app doesn't use WebSockets at all — chat streams over
# SSE, which is a plain HTTP response — so in practice every API request was
# paying to open a fresh TCP connection to the backend.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      '';
}

# Named upstream purely so nginx will hold a pool of idle keepalive connections
# to the backend rather than reconnecting per request. At 100 concurrent users
# the connect/teardown churn — and the TIME_WAIT sockets it strands — is real
# load on both ends.
upstream backend {
  server backend:8000;
  keepalive 64;
  keepalive_timeout 60s;
  keepalive_requests 1000;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 50m;

  # Compress the JSON API and the static bundle.
  #
  # `text/event-stream` is deliberately absent from gzip_types, and must stay
  # absent. gzip buffers input to fill a compression window, so a compressed
  # chat stream would arrive in clumps — or after a long stall — instead of
  # token by token. Doing this in nginx rather than as Express middleware also
  # keeps the compression CPU off the single-threaded Node process.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types
    application/json
    application/javascript
    application/x-javascript
    text/css
    text/plain
    text/xml
    image/svg+xml;

  location /api/ {
    proxy_pass http://backend;
    # HTTP/1.1 plus an empty Connection header is what actually enables upstream
    # keepalive. The `upstream` block above does nothing without both.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # A generation can legitimately run for minutes. read_timeout is measured
    # between chunks rather than across the whole response, but a model can go
    # quiet for a stretch while it works through tool calls, and cutting it off
    # mid-answer is worse than waiting.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Both are required for SSE: with buffering on, nginx holds the entire
    # response until it completes, and chat would arrive as one lump at the end.
    proxy_buffering off;
    proxy_cache off;
  }

  # Hashed asset filenames — safe to cache hard. Everything else falls through
  # to index.html, which must never be cached or clients pin to an old bundle.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
