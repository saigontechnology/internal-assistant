services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docwise}
      POSTGRES_DB: ${POSTGRES_DB:-docwise}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docwise} -d ${POSTGRES_DB:-docwise}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Postgres connection: backend composes the URL from POSTGRES_*.
      # HOST is hardcoded to the compose service name; the rest come from .env.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-docwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docwise}
      POSTGRES_DB: ${POSTGRES_DB:-docwise}
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_HOST_OVERRIDE: ${OPENAI_HOST_OVERRIDE:-}
      CHAT_MODEL: ${CHAT_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      CHUNK_SIZE: ${CHUNK_SIZE}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP}
      # Chat-provider switch. backend/.env is .dockerignore'd, so anything the
      # backend reads must be listed here — the container never sees that file.
      CHAT_PROVIDER: ${CHAT_PROVIDER:-openai}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash-lite}
      GEMINI_CHAT_FALLBACK_MODEL: ${GEMINI_CHAT_FALLBACK_MODEL:-gemini-2.5-flash}
      GEMINI_CHAT_SECOND_FALLBACK_MODEL: ${GEMINI_CHAT_SECOND_FALLBACK_MODEL:-gemini-3.1-flash}
      OPENCODE_API_BASE: ${OPENCODE_API_BASE:-https://opencode.ai/zen/go/v1}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:-}
      # Fallback ladder only — admins pin the live models at /admin/chat-model,
      # and those DB rows win over these. Bare catalog ids, not "zai/glm-5.2".
      OPENCODE_CHAT_MODEL: ${OPENCODE_CHAT_MODEL:-glm-5.2}
      OPENCODE_CHAT_FALLBACK_MODEL: ${OPENCODE_CHAT_FALLBACK_MODEL:-kimi-k2.6}
      OPENCODE_CHAT_SECOND_FALLBACK_MODEL: ${OPENCODE_CHAT_SECOND_FALLBACK_MODEL:-minimax-m3}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_REDIRECT_URI: ${AZURE_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - backend_data:/app/data
    # Lets the container reach services listening on the VPS host's
    # loopback (e.g. 9router on :20128, run via pm2). Inside the container,
    # use `host.docker.internal:<port>` instead of `localhost:<port>`.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
  backend_data:
  redis_data:
