name: DB migrate from old database (in-place)

# Copies data from an OLD database that lives inside the SAME postgres
# container on the VPS into the NEW database defined by the GitHub
# vars/secrets (POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB).
#
# The old database is left untouched; a SQL backup is written to
# $VPS_APP_DIR before anything is copied so the source is recoverable.

on:
  workflow_dispatch:
    inputs:
      old_user:
        description: "Old superuser role (owns the old DB, e.g. docwise)"
        required: true
        default: "docwise"
      old_db:
        description: "Old database name (e.g. docwise)"
        required: true
        default: "docwise"
      run_prisma_migrate:
        description: "Run `npm run db:migrate` after copy"
        type: boolean
        default: true

concurrency:
  group: db-migrate-vps
  cancel-in-progress: false

jobs:
  migrate:
    name: Copy old -> new (in-container)
    runs-on: self-hosted
    steps:
      - name: SSH copy database
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ vars.VPS_PORT || 22 }}
          script_stop: true
          envs: APP_DIR,OLD_USER,OLD_DB,NEW_USER,NEW_PASSWORD,NEW_DB,RUN_PRISMA_MIGRATE
          script: |
            set -euo pipefail
            cd "$APP_DIR"

            echo "==> Source: user=$OLD_USER db=$OLD_DB"
            echo "==> Target: user=$NEW_USER db=$NEW_DB"

            echo "==> Bringing up postgres"
            docker compose up -d postgres

            echo "==> Waiting for postgres to be ready"
            for i in $(seq 1 30); do
              if docker compose exec -T postgres pg_isready -U "$OLD_USER" -d "$OLD_DB" >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done
            docker compose exec -T postgres pg_isready -U "$OLD_USER" -d "$OLD_DB"

            BACKUP_FILE="$APP_DIR/db-backup-${OLD_DB}-$(date +%Y%m%d-%H%M%S).sql"
            echo "==> Backing up $OLD_DB to $BACKUP_FILE"
            docker compose exec -T postgres \
              pg_dump -U "$OLD_USER" -d "$OLD_DB" --no-owner --no-privileges \
              > "$BACKUP_FILE"
            ls -lh "$BACKUP_FILE"

            echo "==> Ensuring role $NEW_USER exists"
            ROLE_SQL="DO \$do\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '${NEW_USER}') THEN CREATE ROLE \"${NEW_USER}\" WITH LOGIN SUPERUSER PASSWORD \$pw\$${NEW_PASSWORD}\$pw\$; ELSE ALTER ROLE \"${NEW_USER}\" WITH LOGIN SUPERUSER PASSWORD \$pw\$${NEW_PASSWORD}\$pw\$; END IF; END \$do\$;"
            docker compose exec -T -e ROLE_SQL="$ROLE_SQL" postgres \
              bash -c 'psql -U '"$OLD_USER"' -d postgres -v ON_ERROR_STOP=1 -c "$ROLE_SQL"'

            echo "==> Ensuring database $NEW_DB exists (owner=$NEW_USER)"
            docker compose exec -T postgres psql -U "$OLD_USER" -d postgres -tAc \
              "SELECT 1 FROM pg_database WHERE datname='$NEW_DB'" | grep -q 1 \
              || docker compose exec -T postgres psql -U "$OLD_USER" -d postgres -v ON_ERROR_STOP=1 \
                   -c "CREATE DATABASE \"$NEW_DB\" OWNER \"$NEW_USER\";"

            echo "==> Streaming $OLD_DB -> $NEW_DB inside the container"
            docker compose exec -T postgres bash -lc "
              pg_dump -U '$OLD_USER' -d '$OLD_DB' --no-owner --no-privileges \
              | psql -U '$NEW_USER' -d '$NEW_DB' -v ON_ERROR_STOP=1
            "

            echo "==> Sanity: list tables in target DB"
            docker compose exec -T postgres psql -U "$NEW_USER" -d "$NEW_DB" -c "\dt"

            if [ "$RUN_PRISMA_MIGRATE" = "true" ]; then
              echo "==> Ensuring backend is up and running db:migrate"
              docker compose up -d backend
              docker compose exec -T backend npm run db:migrate
            fi

            echo "==> Restarting backend to pick up new DB config"
            docker compose restart backend

            echo "==> Done. Backup left at $BACKUP_FILE"
        env:
          APP_DIR: ${{ vars.VPS_APP_DIR }}
          OLD_USER: ${{ github.event.inputs.old_user }}
          OLD_DB: ${{ github.event.inputs.old_db }}
          NEW_USER: ${{ vars.POSTGRES_USER }}
          NEW_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEW_DB: ${{ vars.POSTGRES_DB }}
          RUN_PRISMA_MIGRATE: ${{ github.event.inputs.run_prisma_migrate }}
