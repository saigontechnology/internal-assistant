name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Redeploy backend + frontend regardless of changed paths"
        type: boolean
        default: false

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            infra:
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

  deploy:
    name: Deploy to VPS
    needs: detect-changes
    runs-on: self-hosted
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || needs.detect-changes.outputs.backend == 'true'
          || needs.detect-changes.outputs.frontend == 'true'
          || needs.detect-changes.outputs.infra == 'true' }}
    steps:
      - name: Compute services to rebuild
        id: plan
        env:
          BACKEND_CHANGED: ${{ needs.detect-changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend }}
          INFRA_CHANGED: ${{ needs.detect-changes.outputs.infra }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          services=""
          if [ "$FORCE" = "true" ] || [ "$INFRA_CHANGED" = "true" ]; then
            services="backend frontend"
          else
            [ "$BACKEND_CHANGED" = "true" ]  && services="$services backend"
            [ "$FRONTEND_CHANGED" = "true" ] && services="$services frontend"
          fi
          services="$(echo "$services" | xargs)"
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "Rebuilding: ${services:-<none>}"

      - name: SSH deploy
        if: steps.plan.outputs.services != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ vars.VPS_PORT || 22 }}
          script_stop: true
          envs: DEPLOY_SERVICES,APP_DIR,GIT_REF,OPENAI_API_BASE,OPENAI_API_KEY,OPENAI_HOST_OVERRIDE,CHAT_MODEL,EMBEDDING_MODEL,CHUNK_SIZE,CHUNK_OVERLAP,CHAT_PROVIDER,GOOGLE_GENERATIVE_AI_API_KEY,GEMINI_CHAT_MODEL,GEMINI_CHAT_FALLBACK_MODEL,GEMINI_CHAT_SECOND_FALLBACK_MODEL,OPENCODE_API_BASE,OPENCODE_API_KEY,OPENCODE_CHAT_MODEL,OPENCODE_CHAT_FALLBACK_MODEL,OPENCODE_CHAT_SECOND_FALLBACK_MODEL,POSTGRES_HOST,POSTGRES_PORT,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,AZURE_CLIENT_ID,AZURE_TENANT_ID,AZURE_CLIENT_SECRET,AZURE_REDIRECT_URI,FRONTEND_PORT,FRONTEND_URL,SESSION_SECRET,SHAREPOINT_TENANT_HOSTNAME,SHAREPOINT_SITE_PATH,SHAREPOINT_LIST_NAME,SHAREPOINT_REGISTRY_INCREMENTAL_WINDOW_DAYS
          script: |
            set -euo pipefail
            cd "$APP_DIR"

            echo "==> Fetching latest main"
            git fetch --prune origin main
            git reset --hard "origin/main"

            echo "==> Writing .env (root + backend) from GitHub vars/secrets"
            umask 077
            write_env() {
              cat > "$1" <<EOF
            # --- LLM ---
            OPENAI_API_BASE=$OPENAI_API_BASE
            OPENAI_API_KEY=$OPENAI_API_KEY
            OPENAI_HOST_OVERRIDE=$OPENAI_HOST_OVERRIDE
            CHAT_MODEL=$CHAT_MODEL
            EMBEDDING_MODEL=$EMBEDDING_MODEL
            CHUNK_SIZE=$CHUNK_SIZE
            CHUNK_OVERLAP=$CHUNK_OVERLAP

            # --- Chat provider (openai ↔ gemini ↔ opencode) ---
            CHAT_PROVIDER=$CHAT_PROVIDER
            GOOGLE_GENERATIVE_AI_API_KEY=$GOOGLE_GENERATIVE_AI_API_KEY
            GEMINI_CHAT_MODEL=$GEMINI_CHAT_MODEL
            GEMINI_CHAT_FALLBACK_MODEL=$GEMINI_CHAT_FALLBACK_MODEL
            GEMINI_CHAT_SECOND_FALLBACK_MODEL=$GEMINI_CHAT_SECOND_FALLBACK_MODEL
            OPENCODE_API_BASE=$OPENCODE_API_BASE
            OPENCODE_API_KEY=$OPENCODE_API_KEY
            OPENCODE_CHAT_MODEL=$OPENCODE_CHAT_MODEL
            OPENCODE_CHAT_FALLBACK_MODEL=$OPENCODE_CHAT_FALLBACK_MODEL
            OPENCODE_CHAT_SECOND_FALLBACK_MODEL=$OPENCODE_CHAT_SECOND_FALLBACK_MODEL

            # --- Postgres ---
            POSTGRES_HOST=$POSTGRES_HOST
            POSTGRES_PORT=$POSTGRES_PORT
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            POSTGRES_DB=$POSTGRES_DB

            # --- Microsoft Entra ID (Azure AD) ---
            AZURE_CLIENT_ID=$AZURE_CLIENT_ID
            AZURE_TENANT_ID=$AZURE_TENANT_ID
            AZURE_CLIENT_SECRET=$AZURE_CLIENT_SECRET
            AZURE_REDIRECT_URI=$AZURE_REDIRECT_URI

            # --- App ---
            FRONTEND_PORT=$FRONTEND_PORT
            FRONTEND_URL=$FRONTEND_URL
            SESSION_SECRET=$SESSION_SECRET

            # --- SharePoint List watcher ---
            SHAREPOINT_TENANT_HOSTNAME=$SHAREPOINT_TENANT_HOSTNAME
            SHAREPOINT_SITE_PATH=$SHAREPOINT_SITE_PATH
            SHAREPOINT_LIST_NAME=$SHAREPOINT_LIST_NAME
            SHAREPOINT_REGISTRY_INCREMENTAL_WINDOW_DAYS=$SHAREPOINT_REGISTRY_INCREMENTAL_WINDOW_DAYS
            EOF
            }
            write_env .env
            write_env backend/.env

            echo "==> docker compose build $DEPLOY_SERVICES"
            docker compose build --pull $DEPLOY_SERVICES

            echo "==> docker compose up -d (all services, recreate changed)"
            docker compose up -d $DEPLOY_SERVICES

            if echo " $DEPLOY_SERVICES " | grep -q " backend "; then
              echo "==> Running backend db:migrate"
              docker compose exec -T backend npm run db:migrate
            fi

            echo "==> Pruning dangling images"
            docker image prune -f
        env:
          DEPLOY_SERVICES: ${{ steps.plan.outputs.services }}
          APP_DIR: ${{ vars.VPS_APP_DIR }}
          GIT_REF: ${{ github.sha }}
          # --- LLM ---
          OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_HOST_OVERRIDE: ${{ vars.OPENAI_HOST_OVERRIDE }}
          CHAT_MODEL: ${{ vars.CHAT_MODEL }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
          CHUNK_SIZE: ${{ vars.CHUNK_SIZE }}
          CHUNK_OVERLAP: ${{ vars.CHUNK_OVERLAP }}
          # --- Chat provider (openai ↔ gemini ↔ opencode) ---
          CHAT_PROVIDER: ${{ vars.CHAT_PROVIDER }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GEMINI_CHAT_MODEL: ${{ vars.GEMINI_CHAT_MODEL }}
          GEMINI_CHAT_FALLBACK_MODEL: ${{ vars.GEMINI_CHAT_FALLBACK_MODEL }}
          GEMINI_CHAT_SECOND_FALLBACK_MODEL: ${{ vars.GEMINI_CHAT_SECOND_FALLBACK_MODEL }}
          OPENCODE_API_BASE: ${{ vars.OPENCODE_API_BASE }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_CHAT_MODEL: ${{ vars.OPENCODE_CHAT_MODEL }}
          OPENCODE_CHAT_FALLBACK_MODEL: ${{ vars.OPENCODE_CHAT_FALLBACK_MODEL }}
          OPENCODE_CHAT_SECOND_FALLBACK_MODEL: ${{ vars.OPENCODE_CHAT_SECOND_FALLBACK_MODEL }}
          # --- Postgres ---
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          # --- Azure ---
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_REDIRECT_URI: ${{ vars.AZURE_REDIRECT_URI }}
          # --- App ---
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          # --- SharePoint ---
          SHAREPOINT_TENANT_HOSTNAME: ${{ vars.SHAREPOINT_TENANT_HOSTNAME }}
          SHAREPOINT_SITE_PATH: ${{ vars.SHAREPOINT_SITE_PATH }}
          SHAREPOINT_LIST_NAME: ${{ vars.SHAREPOINT_LIST_NAME }}
          SHAREPOINT_REGISTRY_INCREMENTAL_WINDOW_DAYS: ${{ vars.SHAREPOINT_REGISTRY_INCREMENTAL_WINDOW_DAYS }}
